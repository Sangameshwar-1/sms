name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: school_management
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present || echo "No lint script defined"

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Frontend
        run: cd apps/frontend && npm run build

      - name: Build Backend
        run: cd apps/backend && npm run build

      - name: Setup test environment
        run: |
          cd apps/backend
          npx prisma generate
          npx prisma migrate deploy || npx prisma db push --force-reset
          npx prisma db seed

      - name: Install Playwright browsers
        run: cd apps/e2e && npx playwright install --with-deps

      - name: Start backend server
        run: cd apps/backend && npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/school_management?schema=public
          JWT_SECRET: test_secret_key
          REDIS_URL: redis://localhost:6379
          PORT: 5000

      - name: Start frontend dev server
        run: cd apps/frontend && npm run dev &
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Wait for servers to start
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080 2>/dev/null; then
              echo "Frontend is ready"
              break
            fi
            sleep 2
          done
          for i in {1..30}; do
            if curl -f http://localhost:5000/health 2>/dev/null || curl -f http://localhost:5000 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            sleep 2
          done

      - name: Run E2E tests
        run: cd apps/e2e && npm run test
        env:
          BASE_URL: http://localhost:8080
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
