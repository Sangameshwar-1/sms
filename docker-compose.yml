services:
  postgres:
    image: postgres:15-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: school_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sms-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/school_management?schema=public
      - JWT_SECRET=supersecret_sms_key_production_ready
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: sms-frontend
    restart: unless-stopped
    # Frontend container serves static files using its own nginx or we can just build and share volume.
    # We will use an nginx container for the frontend serving so this container handles that.
    # Exposing port just in case we want direct access, but nginx will sit in front.
    ports:
      - "8080:80"

  nginx:
    image: nginx:alpine
    container_name: sms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
