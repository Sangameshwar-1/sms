version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sms-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: school_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sms-network
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: sms-redis-prod
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data_prod:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?error}
    networks:
      - sms-network
    security_opt:
      - no-new-privileges:true

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/yourusername/sms/backend:latest}
    container_name: sms-backend-prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sms_user}:${POSTGRES_PASSWORD:?error}@postgres:5432/school_management?schema=public
      - JWT_SECRET=${JWT_SECRET:?error}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?error}@redis:6379
      - PORT=5000
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - sms-network
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/yourusername/sms/frontend:latest}
    container_name: sms-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - sms-network
    security_opt:
      - no-new-privileges:true
    environment:
      - VITE_API_URL=/api

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  sms-network:
    driver: bridge
